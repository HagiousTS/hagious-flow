[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback: rotas client-side do React Router caem no index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Cache longo pros assets versionados do Vite (hash no nome)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
