<!doctype html>
<html lang="pt-BR" data-theme="sankhya-light">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Hagious Flow — Sistema operacional para consultorias técnicas e times B2B" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <title>Hagious Flow</title>
    <script>
      // Aplica tema salvo ANTES do React montar (evita flash)
      try {
        var t = localStorage.getItem('hagious-flow-theme') || 'sankhya-light';
        document.documentElement.setAttribute('data-theme', t);
      } catch(e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
